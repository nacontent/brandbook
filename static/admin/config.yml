backend:
  name: git-gateway
  branch: main # ЗАМЕНИ НА master, ЕСЛИ В GITHUB ВЕТКА НАЗЫВАЕТСЯ ТАК
  
media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "docs"
    label: "Документация"
    folder: "content/docs" # Проверь, что папка в VS Code называется именно так
    extension: "md"
    format: "frontmatter"
    create: true
    fields:
      - {label: "Заголовок", name: "title", widget: "string"}
      - {label: "Текст", name: "body", widget: "markdown"}