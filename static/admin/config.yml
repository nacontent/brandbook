backend:
  name: git-gateway
  branch: main
local_backend: true # Это позволит тестировать админку локально позже

media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "docs"
    label: "Документация"
    folder: "content/docs"
    extension: "md"
    format: "frontmatter"
    create: true
    fields:
      - {label: "Заголовок", name: "title", widget: "string"}
      - {label: "Порядок (weight)", name: "weight", widget: "number", default: 10}
      - {label: "Текст", name: "body", widget: "markdown"}