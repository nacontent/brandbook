backend:
  name: git-gateway
  branch: main # Убедись, что ветка в GitHub называется именно так

media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "docs"
    label: "Документация"
    folder: "content/docs"
    extension: "md"
    format: "toml-frontmatter" # ИСПРАВЛЕНО: Теперь это разрешенное значение
    create: true
    fields:
      - {label: "Заголовок", name: "title", widget: "string"}
      - {label: "Текст", name: "body", widget: "markdown"}