backend:
  name: git-gateway
  branch: main
media_folder: "static/uploads"
public_folder: "/uploads"
collections:
  - name: "docs"
    label: "Документация"
    folder: "content/docs"
    extension: "md"
    format: "frontmatter"
    create: true
    fields:
      - {label: "Заголовок", name: "title", widget: "string"}
      - {label: "Текст", name: "body", widget: "markdown"}