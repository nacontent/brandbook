<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Брендбук: Админка</title>
  <link rel="stylesheet" href="https://unpkg.com/@staticcms/app@^4.0.0/dist/main.css" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/@staticcms/app@^4.0.0/dist/static-cms-app.js"></script>
  <script>
    // Если ты разлогинился, принудительно открываем окно входа
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.open();
      }
    });
  </script>
</body>
</html>
